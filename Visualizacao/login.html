<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bem Vindo ao Formulário</title>
<link rel="stylesheet" href="Estilo.css">
</head>

<body>
    
<footer class="topo">
  <div class="container">
    <img src="img/logo-rodape.png" alt="Logo Mirror Fashion">

    <ul class="social">
      <li><a href="http://facebook.com/mirrorfashion">Facebook</a></li>
      <li><a href="http://twitter.com/mirrorfashion">Twitter</a></li>
      <li><a href="http://plus.google.com/mirrorfashion">Google+</a></li>
    </ul>
  </div>
</footer>

<header class="topo">

<div id="Logo_Educacao">
<img src="img/logo_secretaria_da_educacao.png" alt="Logo secretaria da educacao">
</div>

<div id="Logo_Imagem">
<img src="img/Felizes.png" alt="Felicidade">
</div>

<div id="logo_Gov">
<img src="img/logo_gov.png" alt="Logo do Governo de São Paulo">
</div>

</header>

<div class="login-container">

    <h2>Login</h2>

    <form id="frmLogin" class="form">

        <div class="field">
            <label>Email</label>
            <input class="input" type="email" id="email" placeholder="Insira o seu e-mail">
        </div>

        <div class="field">
            <label>Senha</label>
            <input class="input" type="password" id="senha" placeholder="Insira a sua senha">
        </div>

        <button class="btn" type="submit">Entrar</button>

        <div class="msg" id="msg"></div>

    </form>

</div>

<script src="Funcionalidade.js"></script>

</body>
</html>
